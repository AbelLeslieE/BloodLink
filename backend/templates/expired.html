<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>BloodLink</title>

<style>

.bl-response-body,
.bl-response-body *{
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

.bl-response-body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.bl-response-card{
    width:90%;
    max-width:500px;
    background:#fff;
    border-radius:20px;
    padding:50px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.bl-response-icon{
    font-size:70px;
    margin-bottom:20px;
}

.bl-response-title{
    color:#f59e0b;
    margin-bottom:20px;
}

.bl-response-text{
    color:#555;
    line-height:1.7;
    margin-bottom:15px;
}

.bl-response-footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}

</style>

</head>

<body class="bl-response-body">

<div class="bl-response-card">

<div class="bl-response-icon">

⏰

</div>

<h1 class="bl-response-title">

Link Expired

</h1>

<p class="bl-response-text">

This donation request has expired.

</p>

<p class="bl-response-text">

For security reasons email response links are only valid for a limited period.

</p>

<p class="bl-response-text">

Please wait for a new BloodLink notification if another donation request becomes available.

</p>

<div class="bl-response-footer">

BloodLink Blood Donation Management System

</div>

</div>

</body>

</html>
